---
# G1 indoor RGB-D reconstruction profile. The 5 cm TSDF keeps furniture and
# wall boundaries visible while retaining a three-voxel truncation band.
config_verbosity: 0
paths: [khronos, hydra]

map_window:
  type: spatial
  max_radius_m: 8.0

active_window:
  type: ActiveWindow
  volumetric_map:
    with_semantics: true
    voxels_per_side: 16
    voxel_size: 0.05
    truncation_distance: 0.15
  projective_integrator:
    type: ProjectiveIntegrator
    extra_integration_distance: 0.5
  object_detector:
    type: InstanceForwarding
    min_cluster_size: 20
    use_full_connectivity: true
    use_3d: true
    grid_size: 0.05
    max_range: 4.0
  tracker:
    type: ExternalTracker
    temporal_window: 10.0
    min_num_observations: 8
  object_extractor:
    type: MeshObjectExtractor
    verbosity: 1
    min_object_allocation_confidence: 0.5
    min_object_volume: 0.005
    max_object_volume: 10.0
    min_dynamic_displacement: 1.0
    only_extract_reconstructed_objects: true
    min_object_reconstruction_confidence: 0.5
    min_object_reconstruction_observations: 0
    object_reconstruction_resolution: -0.02
    visualize_classification: false
    projective_integrator:
      num_threads: 8

frontend:
  enable_mesh_objects: false
  pgmo:
    time_horizon: 15.0
    d_graph_resolution: 2.5
    mesh_resolution: 0.005
  objects:
    min_cluster_size: 40
    cluster_tolerance: 0.15
    bounding_box_type: OBB
  traversability_places:
    type: traversability
    estimator:
      type: HeightTraversabilityEstimator
      height_below: 0.0
      height_above: 0.5
      min_confidence: 1.0
      min_traversability: 1.0
      pessimistic: true
    clustering:
      type: BlockTraversabilityClustering
      min_place_width: &min_place_width 0.1
      max_place_width: &max_place_width 2.0
      recursive: true
      simplify_boundary_traversability: true
      project_labels_to_ground: true
      label_depth_tolerance: 1.0
      label_use_const_weight: false
  freespace_places:
    type: gvd
    filter_places: true
    min_places_component_size: 3
    filter_ground: false
    gvd:
      max_distance_m: 4.5
      min_distance_m: 0.10
      min_diff_m: 0.05
      voronoi_config:
        mode: L1_THEN_ANGLE
        min_distance_m: 0.20
        parent_l1_separation: 20
        parent_cos_angle_separation: 0.2
    graph:
      type: CompressionGraphExtractor
      compression_distance_m: 1.5
      min_node_distance_m: 0.4
      min_edge_distance_m: 0.25
      node_merge_distance_m: 0.7
      merge_policy: distance
    tsdf_interpolator:
      type: downsample
      ratio: 2

backend:
  publish_backend_tf: true
  add_places_to_deformation_graph: false
  optimize_on_lc: false
  enable_node_merging: false
  update_functors:
    agents:
      type: UpdateAgentsFunctor
    objects:
      type: UpdateObjectsFunctor
    places:
      type: UpdatePlacesFunctor
    traversability:
      type: UpdateTraversabilityFunctor
      min_place_size: *min_place_width
      max_place_size: *max_place_width
      use_metric_distance: false
      tolerance: 0.1
    rooms:
      type: UpdateRoomsFunctor
      room_finder:
        min_dilation_m: 0.5
        max_dilation_m: 1.2
        min_component_size: 10
        min_room_size: 10
        dilation_threshold_mode: PLATEAU
        min_lifetime_length_m: 0.1
        plateau_ratio: 0.15
        clustering_mode: NEIGHBORS
        dilation_diff_threshold_m: -1.0
    buildings:
      type: UpdateBuildingsFunctor
    zmq_labels:
      type: ZmqRoomLabelUpdater
  pgmo:
    run_mode: FULL
    embed_trajectory_delta_t: 5.0
    num_interp_pts: 3
    interp_horizon: 10.0
    enable_sparsify: false
    trans_node_dist: 1.0
    rot_node_dist: 1.2
    optimizer:
      type: KimeraRpgoOptimizer
      solver: LM
      gnc:
        inlier_probability: 0.9
        mu_step: 1.6
        max_iterations: 100
    covariance:
      odom: 1.0e-02
      loop_close: 5.0e-02
      sg_loop_close: 1.0e-01
      prior: 1.0e-02
      mesh_mesh: 1.0e-02
      pose_mesh: 1.0e-02
      place_mesh: 1.0e-02
      place_edge: 10.0
      place_merge: 10.0
      object_merge: 10.0
